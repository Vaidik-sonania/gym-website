kind = "web"
previewPath = "/"
title = "PowerFit Gym Website"
version = "1.0.0"
id = "artifacts/gym-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20942

[services.development]
run = "pnpm --filter @workspace/gym-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/gym-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20942"
BASE_PATH = "/"
